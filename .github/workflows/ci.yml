name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: build + core tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # raylib builds from source for the GUI target; it needs X11/GL
      # dev headers on Linux. The test target itself is headless.
      - name: Install raylib build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run core tests
        run: ctest --test-dir build --output-on-failure

      - name: Headless smoke run
        run: ./build/sector_control --headless --seed 1 --horizon 300
